services:
  nukemai:
    build: .
    image: nukemai:latest
    ports:
      - "3001:3001"
    volumes:
      # Persist all NukemAI state: generated config, auth DB, permissions,
      # sessions/projects, memory, skills/plugins, and router stats.
      - nukemai-home:/root/.nukemai
      # Optional: mount an existing config file instead of generating one from env vars.
      # Create the host file first, then uncomment this line.
      # - ${NUKEMAI_CONFIG:-${HOME}/.nukemai/nukemai.yaml}:/root/.nukemai/nukemai.yaml:ro
      # Optional: expose a host workspace to agents running inside the container.
      # - ${NUKEMAI_WORKSPACE:-${PWD}}:/workspace
    environment:
      - NODE_ENV=production
      - PILOT_HOME=/root/.nukemai
      - SERVER_PORT=3001
      - NUKEMAI_GATEWAY_PORT=18789
      # ── Model configuration (passed through from shell or .env file) ──
      - NUKEMAI_MODEL=${NUKEMAI_MODEL:-}
      - NUKEMAI_API_KEY=${NUKEMAI_API_KEY:-}
      - NUKEMAI_API_URL=${NUKEMAI_API_URL:-}
      - NUKEMAI_LIGHT_MODEL=${NUKEMAI_LIGHT_MODEL:-}
      - NUKEMAI_LIGHT_API_KEY=${NUKEMAI_LIGHT_API_KEY:-}
      - NUKEMAI_LIGHT_API_URL=${NUKEMAI_LIGHT_API_URL:-}
      # ── Authentication: DingTalk SSO ──
      - NUKEMAI_DISABLE_LOCAL_AUTH=0
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY:-}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET:-}
      - DINGTALK_REDIRECT_URI=${DINGTALK_REDIRECT_URI:-}
      #
      # ── Proxy (uncomment if behind corporate proxy) ──
      # - https_proxy=http://host.docker.internal:7890
      # - NUKEMAI_PROXY=http://host.docker.internal:7890
    restart: unless-stopped

volumes:
  nukemai-home:
